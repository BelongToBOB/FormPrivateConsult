<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ลงทะเบียน Exclusive Private Consult</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="wrapper">
      <div class="header">
        <h1>ลงทะเบียนปรึกษาส่วนตัว</h1>
        <p>Exclusive Private Consult </p>
      </div>

      <form id="consultForm" novalidate>
        <div id="formSection">

          <!-- ============================================
               SECTION 1: ข้อมูลติดต่อพื้นฐาน
          ============================================ -->
          <div class="section-title">
            <span class="section-num">1</span>
            <span>ข้อมูลติดต่อ</span>
          </div>

          <div class="card">
            <label>ชื่อ-นามสกุล *</label>
            <input type="text" name="full_name" required />
          </div>

          <div class="card">
            <label>ชื่อเล่น *</label>
            <input type="text" name="nickname" required />
          </div>

          <div class="card">
            <label>อีเมล *</label>
            <input type="email" name="email" required />
          </div>

          <div class="card">
            <label>เบอร์โทรศัพท์ *</label>
            <input type="tel" name="phone" pattern="[0-9]{10}" required />
          </div>

          <div class="card">
            <label>LINE ID *</label>
            <input type="text" name="line_id" placeholder="เช่น @yourname หรือ yourname123" required />
          </div>

          <!-- ============================================
               SECTION 2: โปรไฟล์ธุรกิจ
          ============================================ -->
          <div class="section-title">
            <span class="section-num">2</span>
            <span>โปรไฟล์ธุรกิจ</span>
          </div>

          <div class="card">
            <label>ชื่อธุรกิจ / แบรนด์ *</label>
            <input type="text" name="business_name" required />
          </div>

          <div class="card">
            <label>ประเภทธุรกิจ *</label>
            <div class="option-group">
              <label><input type="radio" name="business_type" value="ค้าปลีก" required /> ค้าปลีก</label>
              <label><input type="radio" name="business_type" value="ค้าส่ง" /> ค้าส่ง</label>
              <label><input type="radio" name="business_type" value="ผลิต / โรงงาน" /> ผลิต / โรงงาน</label>
              <label><input type="radio" name="business_type" value="บริการ" /> บริการ</label>
              <label><input type="radio" name="business_type" value="อาหาร / เครื่องดื่ม / ร้านอาหาร" /> อาหาร / เครื่องดื่ม / ร้านอาหาร</label>
              <label><input type="radio" name="business_type" value="อสังหาริมทรัพย์" /> อสังหาริมทรัพย์</label>
              <label><input type="radio" name="business_type" value="ออนไลน์ / E-commerce" /> ออนไลน์ / E-commerce</label>
              <label><input type="radio" name="business_type" value="อื่นๆ" id="btOtherRadio" /> อื่นๆ</label>
              <input type="text" name="business_type_other" id="btOtherInput" placeholder="ระบุประเภทธุรกิจ" class="hidden" />
            </div>
          </div>

          <div class="card">
            <label>รูปแบบการจดทะเบียน *</label>
            <div class="option-group">
              <label><input type="radio" name="registration" value="บุคคลธรรมดา" required /> บุคคลธรรมดา</label>
              <label><input type="radio" name="registration" value="นิติบุคคล (บริษัท/หจก.)" /> นิติบุคคล (บริษัท / หจก.)</label>
              <label><input type="radio" name="registration" value="ยังไม่ได้จดทะเบียน" /> ยังไม่ได้จดทะเบียน</label>
            </div>
          </div>

          <div class="card">
            <label>อายุธุรกิจ *</label>
            <div class="option-group">
              <label><input type="radio" name="business_age" value="น้อยกว่า 1 ปี" required /> น้อยกว่า 1 ปี</label>
              <label><input type="radio" name="business_age" value="1-3 ปี" /> 1–3 ปี</label>
              <label><input type="radio" name="business_age" value="3-5 ปี" /> 3–5 ปี</label>
              <label><input type="radio" name="business_age" value="5-10 ปี" /> 5–10 ปี</label>
              <label><input type="radio" name="business_age" value="มากกว่า 10 ปี" /> มากกว่า 10 ปี</label>
            </div>
          </div>

          <div class="card">
            <label>รายได้เฉลี่ยต่อเดือน *</label>
            <div class="option-group">
              <label><input type="radio" name="monthly_revenue" value="น้อยกว่า 100,000" required /> น้อยกว่า 100,000</label>
              <label><input type="radio" name="monthly_revenue" value="100k-500k" /> 100,000 – 500,000</label>
              <label><input type="radio" name="monthly_revenue" value="500k-1M" /> 500,000 – 1,000,000</label>
              <label><input type="radio" name="monthly_revenue" value="1M-5M" /> 1,000,000 – 5,000,000</label>
              <label><input type="radio" name="monthly_revenue" value="5M-10M" /> 5,000,000 – 10,000,000</label>
              <label><input type="radio" name="monthly_revenue" value="มากกว่า 10M" /> มากกว่า 10 ล้าน</label>
            </div>
          </div>

          <!-- ============================================
               SECTION 3: สถานะการเงิน / สินเชื่อ
          ============================================ -->
          <div class="section-title">
            <span class="section-num">3</span>
            <span>สถานะการเงิน & สินเชื่อ</span>
          </div>

          <div class="card">
            <label>ตอนนี้มีสินเชื่อกับธนาคารหรือไม่ ? *</label>
            <div class="option-group">
              <label><input type="radio" name="loan_before" value="มี" required /> มี</label>
              <label><input type="radio" name="loan_before" value="ไม่มี" /> ไม่มี</label>
            </div>
          </div>

          <div class="card">
            <label>มีวงเงินสินเชื่อจากธนาคารไหนบ้าง ? (เลือกได้หลายข้อ)</label>
            <div class="option-group">
              <label><input type="checkbox" name="credit_bank" value="ออมสิน" /> ธนาคารออมสิน</label>
              <label><input type="checkbox" name="credit_bank" value="กรุงไทย" /> ธนาคารกรุงไทย</label>
              <label><input type="checkbox" name="credit_bank" value="กรุงเทพ" /> ธนาคารกรุงเทพ</label>
              <label><input type="checkbox" name="credit_bank" value="กสิกร" /> ธนาคารกสิกรไทย</label>
              <label><input type="checkbox" name="credit_bank" value="ไทยพาณิชย์" /> ธนาคารไทยพาณิชย์</label>
              <label><input type="checkbox" name="credit_bank" value="กรุงศรี" /> ธนาคารกรุงศรี</label>
              <label><input type="checkbox" name="credit_bank" value="TTB" /> ธนาคาร TTB</label>
              <label><input type="checkbox" name="credit_bank" value="SME Bank" /> SME Bank</label>
              <label><input type="checkbox" name="credit_bank" value="อื่นๆ" /> อื่นๆ</label>
            </div>
          </div>

          <div class="card">
            <label>วงเงินสินเชื่อรวมที่มีอยู่ตอนนี้ *</label>
            <div class="option-group">
              <label><input type="radio" name="current_credit" value="ไม่มี" required /> ไม่มี</label>
              <label><input type="radio" name="current_credit" value="น้อยกว่า 500k" /> น้อยกว่า 500,000</label>
              <label><input type="radio" name="current_credit" value="500k-1M" /> 500,000 – 1,000,000</label>
              <label><input type="radio" name="current_credit" value="1M-5M" /> 1,000,000 – 5,000,000</label>
              <label><input type="radio" name="current_credit" value="5M-10M" /> 5,000,000 – 10,000,000</label>
              <label><input type="radio" name="current_credit" value="มากกว่า 10M" /> มากกว่า 10 ล้าน</label>
            </div>
          </div>

          <div class="card">
            <label>วงเงินที่ต้องการเพิ่ม / ขยาย *</label>
            <div class="option-group">
              <label><input type="radio" name="target_credit" value="ยังไม่แน่ใจ" required /> ยังไม่แน่ใจ</label>
              <label><input type="radio" name="target_credit" value="น้อยกว่า 500k" /> น้อยกว่า 500,000</label>
              <label><input type="radio" name="target_credit" value="500k-1M" /> 500,000 – 1,000,000</label>
              <label><input type="radio" name="target_credit" value="1M-5M" /> 1,000,000 – 5,000,000</label>
              <label><input type="radio" name="target_credit" value="5M-10M" /> 5,000,000 – 10,000,000</label>
              <label><input type="radio" name="target_credit" value="มากกว่า 10M" /> มากกว่า 10 ล้าน</label>
            </div>
          </div>

          <div class="card">
            <label>เคยมีปัญหาในการกู้ไหม ? *</label>
            <div class="option-group">
              <label><input type="radio" name="loan_problem" value="มี" required /> มี</label>
              <label><input type="radio" name="loan_problem" value="ไม่มี" /> ไม่มี</label>
            </div>
          </div>

          <div class="card">
            <label>ติดปัญหาในการกู้เรื่องอะไร ? (ถ้ามี)</label>
            <textarea name="loan_problem_detail" placeholder="เช่น ยื่นไม่ผ่าน, Statement ไม่พอ, ติด Blacklist ฯลฯ"></textarea>
          </div>

          <!-- ============================================
               SECTION 4: เป้าหมายของ Session
          ============================================ -->
          <div class="section-title">
            <span class="section-num">4</span>
            <span>เป้าหมายของ Session</span>
          </div>

          <div class="card">
            <label>เรื่องหลักที่อยากปรึกษา * (เลือกได้หลายข้อ)</label>
            <div class="option-group">
              <label><input type="checkbox" name="consult_topic" value="เปิดงบการเงิน วิเคราะห์จุดรั่ว" /> เปิดงบการเงิน วิเคราะห์จุดรั่ว</label>
              <label><input type="checkbox" name="consult_topic" value="วางแผนยื่นขอสินเชื่อ" /> วางแผนยื่นขอสินเชื่อ</label>
              <label><input type="checkbox" name="consult_topic" value="จัดโครงสร้างหนี้เดิม (Refinance)" /> จัดโครงสร้างหนี้เดิม (Refinance)</label>
              <label><input type="checkbox" name="consult_topic" value="วางแผนขยายธุรกิจ" /> วางแผนขยายธุรกิจ</label>
              <label><input type="checkbox" name="consult_topic" value="เลือกธนาคาร / ผลิตภัณฑ์สินเชื่อที่เหมาะ" /> เลือกธนาคาร / ผลิตภัณฑ์สินเชื่อที่เหมาะ</label>
              <label><input type="checkbox" name="consult_topic" value="ปรับโครงสร้างธุรกิจให้พร้อมกู้" /> ปรับโครงสร้างธุรกิจให้พร้อมกู้</label>
              <label><input type="checkbox" name="consult_topic" value="อื่นๆ" id="topicOtherBox" /> อื่นๆ</label>
              <input type="text" name="consult_topic_other" id="topicOtherInput" placeholder="ระบุเรื่องที่อยากปรึกษา" class="hidden" />
            </div>
          </div>

          <div class="card">
            <label>เป้าหมายที่อยากได้หลังจบ session *</label>
            <textarea name="expectation" placeholder="เช่น อยากรู้ว่าธุรกิจต้องปรับอะไรเพื่อให้แบงก์อนุมัติ, อยากได้แผนขยายสาขาภายใน 2 ปี ฯลฯ" required></textarea>
          </div>

          <div class="card">
            <label>มีงบการเงิน / เอกสารธุรกิจพร้อมส่งก่อน session ไหม ? *</label>
            <div class="option-group">
              <label><input type="radio" name="documents_ready" value="มีครบพร้อมส่ง" required /> มีครบพร้อมส่ง</label>
              <label><input type="radio" name="documents_ready" value="มีบางส่วน" /> มีบางส่วน</label>
              <label><input type="radio" name="documents_ready" value="ยังไม่มี / ต้องเตรียม" /> ยังไม่มี / ต้องเตรียม</label>
            </div>
          </div>

          <!-- ============================================
               SECTION 5: Attribution
          ============================================ -->
          <div class="section-title">
            <span class="section-num">5</span>
            <span>รู้จักเราจากที่ไหน</span>
          </div>

          <div class="card">
            <label>รู้จัก Exclusive Private Consult จากช่องทางไหน ? * (เลือกได้หลายข้อ)</label>
            <div class="option-group">
              <label><input type="checkbox" name="channel" value="Facebook" /> Facebook</label>
              <label><input type="checkbox" name="channel" value="Tiktok" /> TikTok</label>
              <label><input type="checkbox" name="channel" value="Instagram" /> Instagram</label>
              <label><input type="checkbox" name="channel" value="Youtube" /> YouTube</label>
              <label><input type="checkbox" name="channel" value="Line" /> LINE</label>
              <label><input type="checkbox" name="channel" value="เคยเรียนสัมมนา Inside Bank/IBF" /> เคยเรียนสัมมนา Inside Bank / IBF</label>
              <label><input type="checkbox" name="channel" value="เพื่อนแนะนำ" /> เพื่อนแนะนำ</label>
              <label><input type="checkbox" name="channel" value="อื่นๆ" /> อื่นๆ</label>
            </div>
          </div>

          <!-- ============================================
               PDPA Consent
          ============================================ -->
          <div class="card consent-card">
            <label class="consent-label">
              <input type="checkbox" name="pdpa_consent" id="pdpaConsent" required />
              <span>
                ยินยอมให้ WinWin Wealth Creation เก็บและใช้ข้อมูลนี้
                เพื่อเตรียม session และติดต่อกลับเท่านั้น
                ตาม <a href="#" target="_blank">นโยบายความเป็นส่วนตัว</a>
              </span>
            </label>
          </div>

          <!-- Honeypot -->
          <input type="text" name="website" class="hidden" tabindex="-1" autocomplete="off" />

          <button type="button" id="reviewBtn">ตรวจสอบข้อมูล</button>
        </div>

        <!-- ============================================
             CONFIRM SECTION
        ============================================ -->
        <div id="confirmSection" class="hidden">
          <div class="card">
            <h3>ตรวจสอบข้อมูลก่อนยืนยัน</h3>
            <div id="confirmData"></div>
          </div>

          <button type="submit" id="submitBtn">✅ ยืนยันการส่งข้อมูล</button>
          <button type="button" id="editBtn" class="secondary">แก้ไขข้อมูล</button>
        </div>

        <input type="hidden" name="consult_id" value="EPC_2026" />
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
