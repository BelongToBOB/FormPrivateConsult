version: "3.8"

services:

  # Static web server สำหรับโฮสต์ form (nginx)
  web:
    image: nginx:alpine
    container_name: pc_form_web
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    depends_on:
      - n8n

  # n8n automation
  postgres:
    image: postgres:15
    container_name: pc_postgres
    restart: always
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5681:5432"

  n8n:
    image: n8nio/n8n
    container_name: pc_n8n
    restart: always
    ports:
      - "5679:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: 1234

      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: supersecure

      WEBHOOK_URL: https://automation.winwinwealth.co/
      GENERIC_TIMEZONE: Asia/Bangkok
    depends_on:
      - postgres
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
